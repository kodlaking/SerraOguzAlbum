<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Notum Var</title>
    <style>
        /* Tasarım Ayarları */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Sayfa kaymasın, tam ekran dursun */
        }

        /* Arka Plan Fotoğrafı */
        .background-image {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            background-image: url('bizim-fotograf.jpg'); /* FOTOĞRAF ADINI BURAYA YAZ */
            background-size: cover;
            background-position: center;
            /* Fotoğrafı hafif karartıp bulanıklaştırarak mesajı öne çıkarıyoruz */
            filter: blur(3px) brightness(50%); 
            transform: scale(1.1); /* Bulanıklık kenarlarda beyazlık yapmasın diye hafif büyütüyoruz */
            z-index: -1;
        }

        /* Mesaj Kutusu */
        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
        }

        .message-box {
            background-color: rgba(255, 255, 255, 0.9); /* Hafif şeffaf beyaz kutu */
            color: #333;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: 600;
        }

        .date {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .personal-note {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 0;
            color: #444;
        }

        .heart-icon {
            color: #e74c3c;
            font-size: 1.2rem;
            margin-top: 20px;
        }

    </style>
</head>
<body>

    <div class="background-image"></div>

    <div class="main-container">
        <div class="message-box">
            <h1>İyi Ki Doğdun!</h1>
            <div class="date">2024</div> <p class="personal-note">
                Yeni yaşın sana tüm güzellikleri getirsin. <br>
                Seninle geçen her an, paylaştığımız her gülümseme benim için çok değerli. <br>
                Birlikte daha nice güzel anılar biriktirmek dileğiyle... <br>
                İyi ki varsın.
            </p>
            
            <div class="heart-icon">🤍</div> </div>
    </div>

</body>
</html>
