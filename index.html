<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Mesajım Var!</title>
    <style>
        /* Tasarım Ayarları */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #1a1a1a; color: white; scroll-behavior: smooth; }
        
        /* Karşılama Ekranı (Kart okununca ilk görünen kısım) */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(45deg, #ff416c, #ff4b2b); padding: 20px; }
        
        h1 { font-size: 3rem; margin-bottom: 10px; }
        .message { font-size: 1.2rem; max-width: 500px; margin-bottom: 30px; line-height: 1.6; }

        /* Buton Tasarımı */
        .btn { padding: 15px 30px; background: white; color: #ff416c; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn:hover { transform: scale(1.1); }

        /* Albüm Bölümü */
        .album-section { padding: 50px 20px; background: #1a1a1a; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; max-width: 1000px; margin: auto; }
        .grid img { width: 100%; border-radius: 10px; border: 2px solid #333; transition: 0.3s; }
        
        footer { text-align: center; padding: 40px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>İyi Ki Doğdun! 🎈</h1>
        <p class="message">
            Yeni yaşın sana tüm güzellikleri getirsin. Seninle geçen her an çok kıymetli. 
            Arkadaşlığımızın küçük bir özetini aşağıda bulabilirsin...
        </p>
        <a href="#album" class="btn">Albüme Git →</a>
    </div>

    <div id="album" class="album-section">
        <h2 style="text-align: center; margin-bottom: 30px;">Anılarımız</h2>
        <div class="grid">
            <img src="foto1.jpg" alt="Biz">
            <img src="foto2.jpg" alt="Eğlence">
            <img src="foto3.jpg" alt="Okul">
            <img src="foto4.jpg" alt="Yolculuk">
        </div>
    </div>

    <footer>
        Bu sayfa senin için özel olarak hazırlandı. <br> Arkadaşlığımızın devamında yeni kareler eklenecektir.
    </footer>

</body>
</html>
