<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun!</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #e91e63; }
        .album { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .album img { width: 100%; border-radius: 8px; transition: transform 0.3s; }
        .album img:hover { transform: scale(1.05); }
        p { line-height: 1.6; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>İyi Ki Doğdun! 🎂</h1>
        <p>Seninle olan arkadaşlığımız benim için çok değerli. Bu dijital albüm bizim anılarımızı saklayacak, zamanla yenilerini de buraya ekleyeceğiz!</p>
        
        <div class="album">
            <img src="foto1.jpg" alt="Anı 1">
            <img src="foto2.jpg" alt="Anı 2">
        </div>
    </div>
</body>
</html>
