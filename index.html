<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Notum Var</title>
    <style>
        /* Genel Stil */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212; /* Göz yormayan koyu arka plan */
            color: #e0e0e0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 90%;
            padding: 40px 20px;
            text-align: center;
        }

        /* Fotoğraf Alanı */
        .photo-wrapper {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .photo-wrapper img {
            width: 45%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Mesaj Alanı */
        .message-box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #2a2a2a;
            line-height: 1.8;
            font-size: 1.1rem;
            color: #ccc;
            text-align: left; /* Mesajın daha okunaklı olması için sola yaslı */
        }

        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            color: #fff;
            text-align: center;
            font-weight: 500;
        }

        .footer-note {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 1px;
        }

        /* Mobil Düzenleme */
        @media (max-width: 480px) {
            .photo-wrapper {
                flex-direction: column;
                align-items: center;
            }
            .photo-wrapper img {
                width: 80%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- İki Fotoğrafın Olduğu Kısım -->
        <div class="photo-wrapper">
            <img src="foto1.jpg" alt="Anı 1">
            <img src="foto2.jpg" alt="Anı 2">
        </div>

        <!-- Senin Mesajın -->
        <div class="message-box">
            <h1>Mutlu Yıllar!</h1>
            
            <!-- BURAYI KENDİ MESAJINLA DOLDUR -->
            <p>
                Buraya istediğin mesajı yazabilirsin. <br><br>
                Satır başı yapmak istersen "br" etiketini kullanabilir veya direkt paragraf ekleyebilirsin. 
                İkiniz için anlamlı olan o notu buraya bıraktığında tasarım tam oturacaktır.
            </p>
        </div>

        <div class="footer-note">2026 • Bu sayfa senin için hazırlandı.</div>

    </div>

</body>
</html>
